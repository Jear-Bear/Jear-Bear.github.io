<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="Pitch Mirror">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a2740"/>
      <stop offset="1" stop-color="#1d1b2e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- ghost kanji -->
  <text x="980" y="560" font-family="Hiragino Sans, Noto Sans JP, sans-serif"
        font-size="520" font-weight="500" fill="#8b7bd8" opacity="0.10" text-anchor="middle">声</text>

  <!-- mora labels -->
  <g font-family="Hiragino Sans, Noto Sans JP, sans-serif" font-size="40" fill="#9b97b5" text-anchor="middle">
    <text x="300" y="180">は</text>
    <text x="520" y="180">し</text>
    <text x="740" y="180">を</text>
  </g>

  <!-- target band (atamadaka: high then low) -->
  <path d="M 200 300 L 410 300 L 410 470 L 850 470 L 850 540 L 200 540 Z"
        fill="#8b7bd8" opacity="0.22"/>
  <path d="M 200 300 L 410 300 L 410 470 L 850 470"
        fill="none" stroke="#8b7bd8" stroke-width="4" stroke-dasharray="10 8" opacity="0.7"/>

  <!-- downstep notch -->
  <path d="M 400 300 L 410 300 L 410 470" fill="none" stroke="#a99cea" stroke-width="5"/>

  <!-- live trace (bright) -->
  <path d="M 210 330 Q 300 300 410 320 T 620 480 Q 740 500 840 478"
        fill="none" stroke="#efe9ff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="840" cy="478" r="9" fill="#efe9ff"/>
</svg>
